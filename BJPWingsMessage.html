<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BJP Wings — સંદેશ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;600;700&family=Noto+Sans+Gujarati:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --saffron: #FF6B00;
            --saffron2: #FF9933;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --bg: #070707;
            --card: #141414;
            --card-soft: #1b1b1b;
            --text: #f0ede6;
            --muted: #a89d8e;
            --line: rgba(255,107,0,0.25);
            --shadow: 0 16px 40px rgba(0,0,0,0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(255,107,0,0.18), transparent 55%),
                radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.1), transparent 50%),
                #070707;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px 40px;
            overflow-x: hidden;
        }

        /* ── TRICOLOR TOP BAR ── */
        .tricolor-top {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, #FF9933 33.3%, #ffffff 33.3% 66.6%, #138808 66.6%);
            margin-bottom: 28px;
            opacity: 0.8;
            animation: fadeIn 0.6s ease both;
        }

        /* ── LOGO AREA ── */
        /* -- UPDATED LOGO AREA -- */
        .logo-wrap {
            display: flex;
            flex-direction: row; /* Changed from column to row */
            align-items: center;
            justify-content: center;
            gap: 12px; /* Space between logo and text */
            margin-bottom: 28px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .lotus-svg-wrap {
            width: 64px; /* Slightly smaller to fit horizontally */
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 15px rgba(255,107,0,0.45));
        }

            .lotus-svg-wrap img {
                max-width: 100%;
                height: auto;
            }

        /* Container for BJP + Wings to stack them vertically next to logo */
        .brand-text-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align text to the left of the block */
        }

        .bjp-badge {
            background: linear-gradient(135deg, #FF6B00, #FF9933);
            border-radius: 6px;
            padding: 2px 12px;
            position: relative;
            z-index: 2;
        }

            .bjp-badge span {
                font-family: 'Rajdhani', sans-serif;
                font-size: 20px; /* Adjusted size */
                font-weight: 700;
                letter-spacing: 0.15em;
                color: #fff;
                line-height: 1.2;
                display: block;
            }

        .wings-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gold-light);
            margin-top: 2px;
            opacity: 0.9;
            font-weight: bold;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            animation: fadeIn 0.6s 0.25s ease both;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,107,0,0.4), transparent);
        }

        .divider-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--saffron2);
            box-shadow: 0 0 8px rgba(255,153,51,0.7);
        }

        /* ── MESSAGE CARD ── */
        .msg-card {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: linear-gradient(160deg, rgba(255,107,0,0.08) 0%, rgba(20,20,20,0.95) 40%, var(--card) 100%);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,153,51,0.15);
            padding: 28px 22px 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        /* Decorative corner glow */
        .msg-card::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,0,0.18), transparent 70%);
            pointer-events: none;
        }

        .msg-card::after {
            content: '';
            position: absolute;
            bottom: -20px; left: -20px;
            width: 100px; height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
            pointer-events: none;
        }

        /* Opening quote mark */
        .quote-open {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            line-height: 0.6;
            color: var(--saffron2);
            opacity: 0.5;
            display: block;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        /* Message text */
        .msg-text {
            font-family: 'Noto Sans Gujarati', sans-serif;
            font-size: 17px;
            font-weight: 400;
            line-height: 2;
            color: #f5f0e8;
            position: relative;
            z-index: 1;
            text-align: left;
        }

        .msg-text .highlight {
            color: var(--gold-light);
            font-weight: 700;
        }

        /* Closing line */
        .msg-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,107,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .msg-footer-dot {
            width: 28px; height: 3px;
            border-radius: 2px;
            background: linear-gradient(to right, var(--saffron), var(--gold));
            flex-shrink: 0;
        }

        .msg-author {
            font-family: 'Noto Sans Gujarati', sans-serif;
            font-size: 13px;
            color: var(--gold-light);
            font-weight: 500;
            line-height: 1.5;
        }

        /* ── BOTTOM TRICOLOR ── */
        .tricolor-bottom {
            width: 60px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(to right, #FF9933 33.3%, #ffffff 33.3% 66.6%, #138808 66.6%);
            margin-top: 28px;
            opacity: 0.6;
            animation: fadeIn 0.6s 0.5s ease both;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Lotus petal glow pulse */
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 16px rgba(255,107,0,0.4)); }
            50%       { filter: drop-shadow(0 0 28px rgba(255,153,51,0.7)); }
        }

        .lotus-svg-wrap {
            animation: glowPulse 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="tricolor-top"></div>

    <!-- LOGO -->
    <div class="logo-wrap">
        <div class="lotus-svg-wrap">
            <img src="img/bjp_only_logo.png" alt="BJP Logo" />
        </div>

        <div class="brand-text-block">
            <!--<div class="bjp-badge">
                <span></span>
            </div>-->
            <div class="wings-label">BJP Wings</div>
        </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
    </div>

    <!-- MESSAGE CARD -->
    <div class="msg-card">
        <span class="quote-open">"</span>

        <div class="msg-text">
            પ્રિય <span class="highlight">કાર્યકર્તા મિત્રો</span>,<br><br>
            આપની મહેનત, શિસ્ત અને સેવા ભાવથી અમે ખૂબ ગર્વ અનુભવ્યે છીએ.<br><br>
            આપ સૌ સંગઠનની <span class="highlight">સાચી તાકાત</span> છો.<br><br>
            આપના સાથ અને સમર્પણ માટે દિલથી આભાર. આવી જ લાગણી સાથે આગળ વધીએ,<br><br>
            <span class="highlight">વિજય નિશ્ચિત છે.</span>
        </div>

        <div class="msg-footer">
            <div class="msg-footer-dot"></div>
            <div class="msg-author">
                ઉમ્મેદવારશ્રીઓ તથા WINGS TEAM
            </div>
        </div>
    </div>

    <div class="tricolor-bottom"></div>

</body>
</html>
