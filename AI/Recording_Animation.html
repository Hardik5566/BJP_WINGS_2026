<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recording UI</title>

<style>
body {
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.record-container {
    background: white;
    width: 400px;
    padding: 15px 20px;
    border-radius: 25px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Mic Icon */
.mic {
    width: 35px;
    height: 35px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 18px;
}

/* Wave Animation */
.wave {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
}

.wave span {
    width: 4px;
    height: 10px;
    background: #25D366;
    border-radius: 2px;
    animation: wave 1s infinite ease-in-out;
}

.wave span:nth-child(2) { animation-delay: 0.1s; }
.wave span:nth-child(3) { animation-delay: 0.2s; }
.wave span:nth-child(4) { animation-delay: 0.3s; }
.wave span:nth-child(5) { animation-delay: 0.4s; }
.wave span:nth-child(6) { animation-delay: 0.5s; }
.wave span:nth-child(7) { animation-delay: 0.6s; }
.wave span:nth-child(8) { animation-delay: 0.7s; }

@keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 28px; }
}

/* Timer */
.timer {
    font-weight: bold;
    color: #555;
}
</style>
</head>

<body>

<div class="record-container">
    <div class="mic">🎤</div>

    <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="timer">00:12</div>
</div>

</body>
</html>
